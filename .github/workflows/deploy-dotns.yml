name: Deploy to DotNS

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: dotns-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-static:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install deps and generate PAPI descriptors
        run: yarn install --immutable && yarn codegen
        working-directory: .
      - run: yarn install --immutable
      - run: yarn run build
        env:
          PUBLIC_CAPTCHA_KEY: 6LcgFI4nAAAAAATrEMoJ6zBacsx5udc1UhGFXemH
          STATIC: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: faucet-dotns
          path: ./client/build
          if-no-files-found: error
          retention-days: 1

  deploy:
    needs: [build-static]
    runs-on: ubuntu-latest
    outputs:
      cid: ${{ steps.deploy.outputs.cid }}
      domain: ${{ steps.deploy.outputs.domain }}
      url: ${{ steps.url.outputs.url }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/download-artifact@v4
        with:
          name: faucet-dotns
          path: build
      - name: Install bulletin-deploy CLI
        run: npm install -g bulletin-deploy
      - name: Resolve target domain
        id: domain
        env:
          EVENT: ${{ github.event_name }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          if [ "$EVENT" = "pull_request" ]; then
            echo "domain=faucet-pr${PR_NUM}-preview00.dot" >> "$GITHUB_OUTPUT"
          else
            echo "domain=faucet.dot" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy to Bulletin + DotNS
        id: deploy
        env:
          MNEMONIC: ${{ secrets.DOTNS_MNEMONIC }}
          NODE_OPTIONS: --max-old-space-size=8192
        run: bulletin-deploy --js-merkle build ${{ steps.domain.outputs.domain }}
      - name: Compute browser URL
        id: url
        env:
          DOMAIN: ${{ steps.deploy.outputs.domain }}
        run: echo "url=https://${DOMAIN}.dot.li" >> "$GITHUB_OUTPUT"
      - name: Deployment summary
        env:
          DOMAIN: ${{ steps.deploy.outputs.domain }}
          CID: ${{ steps.deploy.outputs.cid }}
          URL: ${{ steps.url.outputs.url }}
        run: |
          {
            echo "### ${DOMAIN}.dot"
            echo ""
            echo "Browser &nbsp; ${URL}"
            echo "Desktop &nbsp; \`${DOMAIN}.dot\`"
            echo "CID &nbsp; \`${CID}\`"
          } >> "$GITHUB_STEP_SUMMARY"
