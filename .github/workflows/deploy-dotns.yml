name: Deploy to DotNS

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
    inputs:
      skip-cache:
        description: "Force redeploy (skip cache)"
        type: boolean
        default: false

concurrency:
  group: dotns-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build-static:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install deps and generate PAPI descriptors
        run: yarn install --immutable && yarn codegen
        working-directory: .
      - run: yarn install --immutable
      - run: yarn run build
        env:
          PUBLIC_CAPTCHA_KEY: 6LcgFI4nAAAAAATrEMoJ6zBacsx5udc1UhGFXemH
          STATIC: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: faucet-dotns
          path: ./client/build
          if-no-files-found: error
          retention-days: 1

  deploy-production:
    if: github.event_name == 'push'
    needs: [build-static]
    uses: paritytech/bulletin-deploy/.github/workflows/deploy.yml@main
    with:
      artifact-name: faucet-dotns
      dotns-domain: faucet.dot
      skip-cache: ${{ inputs.skip-cache || false }}
      max-retries: 10
    secrets:
      mnemonic: ${{ secrets.DOTNS_MNEMONIC }}

  deploy-preview:
    if: github.event_name == 'pull_request'
    needs: [build-static]
    uses: paritytech/bulletin-deploy/.github/workflows/deploy.yml@main
    with:
      artifact-name: faucet-dotns
      dotns-domain: faucet-pr${{ github.event.pull_request.number }}-preview00.dot
      comment-on-pr: true
      max-retries: 10
    secrets:
      mnemonic: ${{ secrets.DOTNS_MNEMONIC }}
