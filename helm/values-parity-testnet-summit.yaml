substrate-faucet:
  faucet:
    secret:
      SMF_CONFIG_FAUCET_ACCOUNT_MNEMONIC: ref+vault://kv/argo-cd/substrate-faucet/opstooling-parity-testnet#SUMMIT_FAUCET_ACCOUNT_MNEMONIC
      # We use the same recaptcha token for all faucets
      SMF_CONFIG_RECAPTCHA_SECRET: ref+vault://kv/argo-cd/substrate-faucet/devops-parity-testnet#FAUCET_RECAPTCHA_SECRET
      SMF_CONFIG_MATRIX_ACCESS_TOKEN: ref+vault://kv/argo-cd/substrate-faucet/devops-parity-testnet#SUMMIT_MATRIX_ACCESS_TOKEN
    config:
      SMF_CONFIG_NETWORK: 'summit'
      SMF_CONFIG_MATRIX_SERVER: 'https://m.parity.io'
      SMF_CONFIG_MATRIX_BOT_USER_ID: '@summit-faucet-bot:parity.io'
      SMF_CONFIG_FAUCET_IGNORE_LIST: ''
    externalAccess: true
  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.class: traefik-external
      external-dns.alpha.kubernetes.io/target: traefik-external.parity-testnet.parity.io.
      cert-manager.io/cluster-issuer: letsencrypt-dns01
      traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
    host: summit-faucet.parity-testnet.parity.io
    tls:
      - hosts:
          - summit-faucet.parity-testnet.parity.io
        secretName: summit-faucet.parity-testnet.parity.io
  serviceMonitor:
    enabled: true
